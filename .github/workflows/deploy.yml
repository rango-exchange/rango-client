name: Deploy
on:
  workflow_dispatch:

  workflow_call:
    inputs:
      PLAYGROUND_RANGO_API_KEY:
        required: true
        type: string 
      RANGO_API_KEY:
        required: true
        type: string
      TEST_MODE:
        required: true
        type: string
    
jobs:
  deploy-it:
    runs-on: ubuntu-latest
    env:          
      REACT_APP_PLAYGROUND_RANGO_API_KEY: ${{ inputs.PLAYGROUND_RANGO_API_KEY }}
      REACT_APP_RANGO_API_KEY: ${{ inputs.RANGO_API_KEY }}              
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Debug Variables
        run: |
          echo "Full vars context: ${{ toJson(envs) }}"
          echo "Full vars context: ${{ toJson(env) }}"          
          echo "Playground API Key: ${{ inputs.PLAYGROUND_RANGO_API_KEY }}"          
          echo "Rango API Key: ${{ inputs.RANGO_API_KEY }}"          
          echo "TEST_MODE: ${{ inputs.TEST_MODE }}"

      - run: git pull  
      
      - name: Prepare
        uses: ./.github/actions/prepare
        
        env:
          REF: ${{ github.ref }}
          GH_TOKEN: ${{ github.token }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_WIDGET_CONFIG: ${{ secrets.VERCEL_PROJECT_WIDGET_CONFIG }}
          VERCEL_PROJECT_WIDGET_APP: ${{ secrets.VERCEL_PROJECT_WIDGET_APP }}
          VERCEL_PROJECT_STORYBOOK: ${{ secrets.VERCEL_PROJECT_STORYBOOK }}
          VERCEL_PROJECT_Q: ${{ secrets.VERCEL_PROJECT_Q }}          
